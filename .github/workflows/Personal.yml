name: Personal Kernel Build

on:
  workflow_dispatch:
    inputs:
      clang_version:
        description: Type the clang version of ur kernel
        required: true
        type: choice
        options:
          - clang-r563880c
          - clang-stable
          - clang-r574158
          - clang-r450784e
          
      kernel_source:
        description: Kernel Source Repo URL
        required: true
        type: string
        default: "https://github.com/Justadeayo/android_kernel_xiaomi_violet"
        
      kernel_branch:
        description: Kernel Branch
        required: true
        type: string
        
      defconfig_name:
        description: Defconfig Name
        required: true
        type: string
        default: "vendor/violet-perf_defconfig"
        
      device_codename:
        description: Device Codename (e.g. marble, alioth, vayu)
        required: true
        type: string
        default: "violet"
        
      ksu_type:
        description: "KernelSU Version"
        required: false
        type: choice
        options:
          - None
          - KernelSU
          - ReSukiSU-with-susfs
        default: KernelSU

      BUILD_COMMIT:
         description: "Any new changes that applies as a build note/commit"
         required: true
         type: string
          
      telegram_chat_id:
        description: "Telegram Chat ID (e.g. -1001234567890)"
        required: true
        type: string
        
      telegram_bot_token:
        description: "Telegram Bot Token (e.g. 123456:ABC-DEF...)"
        required: true
        type: string

jobs:
  Kernel_CI:
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup SWAP
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Start Time
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev libdw-dev build-essential lz4 git python3 curl dwarves cpio lld gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi zip

      - name: Clone Kernel Source
        run: |
          rm -rf kernel
          git clone --depth=1 -b ${{ inputs.kernel_branch }} ${{ inputs.kernel_source }} kernel

      - name: Prepare Metadata
        run: |
          echo "KERNEL_VER=$(cd kernel && make kernelversion)" >> $GITHUB_ENV
          
          git clone --depth=1 https://github.com/Justadeayo/KernelSU.git KSU_REPO
          cd KSU_REPO
          echo "LAST_KSU_COMMIT=$(git log -1 --pretty=%s)" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "BUILD_COMMIT=${{ inputs.BUILD_COMMIT }}" >> $GITHUB_ENV
          cd ..
          
          echo "SUSFS_LABEL=$([[ "${{ inputs.ksu_type }}" == "ReSukiSU-with-susfs" ]] && echo "Yes" || echo "??")" >> $GITHUB_ENV

      - name: Send Build Start Message
        run: |
          TG_MSG="*========================*%0A"
          TG_MSG+="*   J  U  S  T  U  S    *%0A"
          TG_MSG+="*   K  E  R  N  E  L    *%0A"
          TG_MSG+="*========================*%0A"
          TG_MSG+="*Compiler*: \`${{ inputs.clang_version }}\`%0A"
          TG_MSG+="*Linux Version*: \`${KERNEL_VER}\`%0A"
          TG_MSG+="*Device*: \`${{ inputs.device_codename }}\`%0A"
          TG_MSG+="*KernelSU*: \`${{ inputs.ksu_type }}\`%0A"
          TG_MSG+="*SUSFS*: \`${SUSFS_LABEL}\`%0A"
          TG_MSG+="*Build Date*: \`$(date -u +'%Y-%m-%d %H:%M UTC')\`%0A"
          TG_MSG+="*KSU Commit*: \`${LAST_KSU_COMMIT}\`%0A"
          TG_MSG+="*KSU Hash*: \`${COMMIT_HASH}\`%0A"
          TG_MSG+="*Build Notes*: \`${BUILD_COMMIT}\`"

          curl -sX POST "https://api.telegram.org/bot${{ inputs.telegram_bot_token }}/sendMessage" \
            -d "chat_id=${{ inputs.telegram_chat_id }}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true" \
            -d "text=${TG_MSG}"

      - name: Download AOSP Clang
        run: |
          mkdir -p toolchains/${{ inputs.clang_version }}
          cd toolchains
          OLD_TAGS=("clang-r450784e")
          if [[ " ${OLD_TAGS[@]} " =~ " ${{ inputs.clang_version }} " ]]; then
            curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r33/${{ inputs.clang_version }}.tar.gz
          else
            curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/${{ inputs.clang_version }}.tar.gz
          fi
          tar -xf "${{ inputs.clang_version }}.tar.gz" -C ${{ inputs.clang_version }}

      - name: Compile Kernel
        run: |
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin"
          export PATH="${CLANG_ROOT}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC="${CLANG_ROOT}/clang"
          export CXX="${CLANG_ROOT}/clang++"
          export HOSTCC="${CLANG_ROOT}/clang"
          export HOSTCXX="${CLANG_ROOT}/clang++"
          export LD="${CLANG_ROOT}/ld.lld"
          export AR="${CLANG_ROOT}/llvm-ar"
          export NM="${CLANG_ROOT}/llvm-nm"
          export OBJCOPY="${CLANG_ROOT}/llvm-objcopy"
          export OBJDUMP="${CLANG_ROOT}/llvm-objdump"
          export STRIP="${CLANG_ROOT}/llvm-strip"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          cd kernel
          case "${{ inputs.ksu_type }}" in
            "KernelSU")
              curl -LSs "https://raw.githubusercontent.com/Justadeayo/KernelSU/refs/heads/master/kernel/setup.sh" | bash -s master
              ;;
            "ReSukiSU-with-susfs")
              curl -LSs "https://raw.githubusercontent.com/skye-tachyon/KernelSU/master/kernel/setup.sh" | bash -s master
              ;;
          esac
          
          DEFCONFIG="arch/arm64/configs/${{ inputs.defconfig_name }}"
          
          if [[ "${{ inputs.ksu_type }}" == "ReSukiSU-with-susfs" ]]; then
            echo "CONFIG_KSU=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
          elif [[ "${{ inputs.ksu_type }}" == "KernelSU" ]]; then
            echo "CONFIG_KSU=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_SUSFS=y" >> "$DEFCONFIG"
            echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> "$DEFCONFIG"
          fi
          
          echo "CONFIG_KPROBES=y" >> "$DEFCONFIG"
          echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG"
          echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG"
          echo "CONFIG_KSU_KPROBE_HOOKS=y" >> "$DEFCONFIG"
          echo "CONFIG_OVERLAY_FS=y" >> "$DEFCONFIG"
          
          touch ./.scmversion
          make O=out ${{ inputs.defconfig_name }}
          
          set +e
          make -j$(nproc) O=out 2>&1 | tee "${GITHUB_WORKSPACE}/build.log"
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "Kernel compilation failed!"
            exit 1
          fi

      - name: Make AnyKernel3
        run: |
          SUSFS_LABEL="N/A"
          if [[ "${{ inputs.ksu_type }}" == "ReSukiSU-with-susfs" ]]; then
            SUSFS_LABEL="SUSFS"
          fi
          
          ZIP_NAME="${{ inputs.device_codename }}_${{ inputs.ksu_type }}_$(date -u +"%Y%m%d_%H%M")"
          BOOT_DIR="kernel/out/arch/arm64/boot"
          
          git clone -b master https://github.com/Justadeayo/AnyKernel3.git
          
          if [ -f $BOOT_DIR/Image.gz ]; then
              echo "Found Image.gz, prioritizing and copying it."
              cp $BOOT_DIR/Image.gz AnyKernel3/Image.gz
          elif [ -f $BOOT_DIR/Image.gz-dtb ]; then
              echo "Image.gz not found, falling back to Image.gz-dtb."
              cp $BOOT_DIR/Image.gz-dtb AnyKernel3/Image.gz-dtb
          fi
          
          if [ -f $BOOT_DIR/dtb.img ]; then
              echo "Found dtb.img, copying as dtb."
              cp $BOOT_DIR/dtb.img AnyKernel3/dtb
          elif [ -f $BOOT_DIR/dtb ]; then
              echo "Found dtb, copying to AnyKernel3."
              cp $BOOT_DIR/dtb AnyKernel3/dtb
          fi
          
          if [ -f $BOOT_DIR/dtbo.img ]; then
              echo "dtbo.img found, adding to AnyKernel."
              cp $BOOT_DIR/dtbo.img AnyKernel3/dtbo.img
          fi
          
          cd AnyKernel3
          sed -i "s/device.name1=.*/device.name1=${{ inputs.device_codename }}/" anykernel.sh
          
          CLANG_ROOT="${GITHUB_WORKSPACE}/toolchains/${{ inputs.clang_version }}/bin"
          CLANG_VER=$("${CLANG_ROOT}/clang" --version | head -n1 | sed 's/(https.*//' | sed 's/ version//' | xargs)
          BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M UTC')
          
          if [[ "${{ inputs.ksu_type }}" != "None" ]]; then
            sed -i "s|ksu_supported=false|ksu_supported=true|" anykernel.sh
          fi
          
          sed -i "s|##CLANG_VERSION##|${CLANG_VER}|" anykernel.sh
          sed -i "s|##BUILD_DATE##|${BUILD_DATE}|" anykernel.sh
          
          zip -r9 ../"${ZIP_NAME}.zip" * -x .git
          
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload Kernel ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-zip
          path: "*.zip"

      - name: Create GitHub Release
        run: |
          REL_NAME="${{ inputs.device_codename }}_${{ inputs.ksu_type }}_$(date -u +"%Y%m%d_%H%M")"
          ZIP_FILE=$(ls *.zip)
          gh release create "$REL_NAME" --title "$REL_NAME" --notes "Automated custom kernel build" "${ZIP_FILE}"

      - name: Upload to Telegram
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - BUILD_START))
          MINS=$((DURATION / 60))
          SECS=$((DURATION % 60))
          
          ZIP_FILE=$(ls *.zip)
          FILE_SIZE=$(du -sh "$ZIP_FILE" | cut -f1)
          
          SUCCESS_MSG="*Build Successful!* ✅

          *Device*: \`${{ inputs.device_codename }}\`
          *KernelSU*: \`${{ inputs.ksu_type }}\`
          *SUSFS*: \`${SUSFS_LABEL}\`
          *File*: \`${ZIP_NAME}.zip\`
          *Size*: \`${FILE_SIZE}\`
          *Duration*: \`${MINS}m ${SECS}s\`
          *Date*: \`$(date -u +'%Y-%m-%d %H:%M UTC')\`"

          curl -sX POST -F document=@"${ZIP_FILE}" \
            "https://api.telegram.org/bot${{ inputs.telegram_bot_token }}/sendDocument" \
            -F "chat_id=${{ inputs.telegram_chat_id }}" \
            -F "parse_mode=Markdown" \
            -F "caption=${SUCCESS_MSG}"

      - name: Send Build Failure Message & Logs
        if: failure()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - BUILD_START))
          MINS=$((DURATION / 60))
          SECS=$((DURATION % 60))

          if [ -f "${GITHUB_WORKSPACE}/build.log" ]; then
            tail -n 35 "${GITHUB_WORKSPACE}/build.log" > "${GITHUB_WORKSPACE}/error_preview.txt"
            zip -j "${GITHUB_WORKSPACE}/error_logs.zip" "${GITHUB_WORKSPACE}/build.log" "${GITHUB_WORKSPACE}/error_preview.txt"
          fi

          FAIL_MSG="*Build Failed!* ❌

          *Device*: \`${{ inputs.device_codename }}\`
          *KernelSU*: \`${{ inputs.ksu_type }}\`
          *Duration*: \`${MINS}m ${SECS}s\`
          *Run Link*: [View Actions Log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          if [ -f "${GITHUB_WORKSPACE}/error_logs.zip" ]; then
            curl -sX POST -F document=@"${GITHUB_WORKSPACE}/error_logs.zip" \
              "https://api.telegram.org/bot${{ inputs.telegram_bot_token }}/sendDocument" \
              -F "chat_id=${{ inputs.telegram_chat_id }}" \
              -F "parse_mode=Markdown" \
              -F "caption=${FAIL_MSG}"
          else
            curl -sX POST "https://api.telegram.org/bot${{ inputs.telegram_bot_token }}/sendMessage" \
              -d "chat_id=${{ inputs.telegram_chat_id }}" \
              -d "parse_mode=Markdown" \
              -d "disable_web_page_preview=true" \
              -d "text=${FAIL_MSG}"
          fi
